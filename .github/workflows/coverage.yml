name: coverage

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  coverage:
    runs-on: windows-2022

    env:
      VCPKG_ROOT: ${{ github.workspace }}/code/deps/vcpkg
      VCPKG_DOWNLOADS: ${{ github.workspace }}/.vcpkg_downloads
      VCPKG_BINARY_CACHE: ${{ github.workspace }}/.vcpkg_binary_cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg_binary_cache,readwrite
      VCPKG_FEATURE_FLAGS: manifests,binarycaching

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Compute vcpkg SHA
        shell: bash
        run: echo "VCPKG_SHA=$(git -C code/deps/vcpkg rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Create vcpkg cache dirs
        shell: bash
        run: mkdir -p "${{ env.VCPKG_DOWNLOADS }}" "${{ env.VCPKG_BINARY_CACHE }}"

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkgdl-windows-2022-vcpkg:${{ env.VCPKG_SHA }}-manifest:${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkgdl-windows-2022-vcpkg:${{ env.VCPKG_SHA }}

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_BINARY_CACHE }}
          key: vcpkgbin-windows-2022-dest-win-ninja-Debug-vcpkg:${{ env.VCPKG_SHA }}-manifest:${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: sccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          variant: sccache
          key: ccache-windows-2022-dest-win-ninja-Debug
          max-size: 500M

      - name: Bootstrap vcpkg
        run: ${{ github.workspace }}\code\deps\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore VCPKG_ROOT
        shell: bash
        run: echo "VCPKG_ROOT=${{ github.workspace }}/code/deps/vcpkg" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: >
          cmake --preset dest-win-ninja-Debug
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset dest-win-ninja-Debug

      - name: Install OpenCppCoverage
        run: choco install opencppcoverage -y

      - name: Compute coverage
        run: >
          OpenCppCoverage
          --sources "${{ github.workspace }}\\code\\src"
          --cover_children
          --export_type html:coverage
          --export_type cobertura:coverage.xml
          --
          ctest --test-dir out/build/dest-win-ninja-Debug
          --output-on-failure
          --no-tests=error

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
