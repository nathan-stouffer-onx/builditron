name: build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  library:
    runs-on: ${{ matrix.host.image }}
    strategy:
      # Cancel all in-progress and queued jobs in the matrix if any job in the matrix fails
      fail-fast: true

      # matrix docs: https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#jobsjob_idstrategymatrix
      matrix:
        # image states
        # windows-2022: https://github.com/actions/runner-images/blob/main/images/windows/Windows2022-Readme.md
        # macos-14:     https://github.com/actions/runner-images/blob/main/images/macos/macos-14-Readme.md
        # ubuntu-22.04: https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2204-Readme.md
        host:
          - { image: windows-2022, preset_prefix: host-win,                 multi_config: false, run_tests: true  }
          - { image: macos-14,     preset_prefix: host-mac,                 multi_config: false, run_tests: true  }
          - { image: ubuntu-22.04, preset_prefix: host-linux,               multi_config: false, run_tests: true  }
          - { image: windows-2022, preset_prefix: dest-win-ninja,           multi_config: true,  run_tests: true  }
          - { image: macos-14,     preset_prefix: dest-mac-ninja,           multi_config: true,  run_tests: true  }
          - { image: ubuntu-22.04, preset_prefix: dest-emscripten,          multi_config: true,  run_tests: true  }
          - { image: macos-14,     preset_prefix: dest-emscripten,          multi_config: true,  run_tests: true  }
          - { image: windows-2022, preset_prefix: dest-emscripten,          multi_config: true,  run_tests: true  }
          - { image: macos-14,     preset_prefix: dest-ios-simulator-ninja, multi_config: true,  run_tests: false }
          - { image: macos-14,     preset_prefix: dest-ios-device-ninja,    multi_config: true,  run_tests: false }
          - { image: ubuntu-22.04, preset_prefix: dest-android-arm64,       multi_config: true,  run_tests: false }
          - { image: ubuntu-22.04, preset_prefix: dest-android-x86_64,      multi_config: true,  run_tests: false }
        build_type: [Debug, RelWithDebInfo, Release, MinSizeRel]
    
    env:
      VCPKG_ROOT: ${{ github.workspace }}/code/deps/vcpkg
      VCPKG_DOWNLOADS: ${{ github.workspace }}/.vcpkg_downloads
      VCPKG_BINARY_CACHE: ${{ github.workspace }}/.vcpkg_binary_cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg_binary_cache,readwrite
      VCPKG_FEATURE_FLAGS: manifests,binarycaching

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Compute vcpkg SHA
        shell: bash
        run: echo "VCPKG_SHA=$(git -C code/deps/vcpkg rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Create vcpkg cache dirs
        shell: bash
        run: mkdir -p "${{ env.VCPKG_DOWNLOADS }}" "${{ env.VCPKG_BINARY_CACHE }}"

      # Use this to set up an open ssh debugging session with CI
      # - name: Setup ssh session
      #   uses: lhotari/action-upterm@v1

      - name: Set reusable strings
        # Turn repeated input strings (such as the presets) into step outputs. These step outputs can be used throughout the workflow file.
        id: strings
        shell: bash
        run: |
          if [[ "${{ matrix.host.multi_config }}" == "true" ]]; then
            echo "configure-preset=${{ matrix.host.preset_prefix }}" >> "$GITHUB_OUTPUT"
          else
            echo "configure-preset=${{ matrix.host.preset_prefix }}-${{ matrix.build_type }}" >> "$GITHUB_OUTPUT"
          fi
          echo "build-preset=${{ matrix.host.preset_prefix }}-${{ matrix.build_type }}" >> "$GITHUB_OUTPUT"

          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            echo "compiler-cacher"=sccache >> "$GITHUB_OUTPUT"
          else
            echo "compiler-cacher"=ccache >> "$GITHUB_OUTPUT"
          fi

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkgdl-${{ matrix.host.image }}-vcpkg:${{ env.VCPKG_SHA }}-manifest:${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkgdl-${{ matrix.host.image }}-vcpkg:${{ env.VCPKG_SHA }}

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_BINARY_CACHE }}
          key: vcpkgbin-${{ matrix.host.image }}-${{ matrix.host.preset_prefix }}-vcpkg:${{ env.VCPKG_SHA }}-manifest:${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        if: runner.os != 'Windows'
        with:
          key: ccache-${{ matrix.host.image }}-${{ matrix.host.preset_prefix }}-${{ matrix.build_type }}
          max-size: 500M

      - name: sccache
        uses: hendrikmuhs/ccache-action@v1.2
        if: runner.os == 'Windows'
        with:
          variant: sccache
          key: ccache-${{ matrix.host.image }}-${{ matrix.host.preset_prefix }}-${{ matrix.build_type }}
          max-size: 500M

      - name: Bootstrap vcpkg (windows)
        if: runner.os == 'Windows'
        run: ${{ github.workspace }}\code\deps\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Bootstrap vcpkg (mac)
        if: runner.os != 'Windows'
        run: ${{ github.workspace }}/code/deps/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Setup MSVC dev environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore VCPKG_ROOT
        if: runner.os == 'Windows'
        shell: bash
        run: echo "VCPKG_ROOT=${{ github.workspace }}/code/deps/vcpkg" >> "$GITHUB_ENV"

      - name: Setup Emscripten
        if: matrix.host.preset_prefix == 'dest-emscripten'
        shell: bash
        run: |
          cd code/deps/emsdk
          ./emsdk install latest
          ./emsdk activate latest

      - name: Setup Android
        if: matrix.host.preset_prefix == 'dest-android'
        shell: bash
        run: |
          cd code/deps/android-ndk
          make

      - name: Configure CMake
        run: >
          cmake --preset ${{ steps.strings.outputs.configure-preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=${{ steps.strings.outputs.compiler-cacher }}
          -DCMAKE_CXX_COMPILER_LAUNCHER=${{ steps.strings.outputs.compiler-cacher }}

      - name: Build
        run: cmake --build --preset ${{ steps.strings.outputs.build-preset }}

      - name: Test
        # Execute tests defined by the CMake configuration. Note that --build-config is needed because there are multi-config generators
        # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
        if: matrix.host.run_tests
        run: ctest --test-dir build/${{ steps.strings.outputs.configure-preset }} --build-config ${{ matrix.build_type }} --output-on-failure --no-tests=error
